services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${HTTP_PROXY:-}
        https_proxy: ${HTTPS_PROXY:-}
        no_proxy: ${NO_PROXY:-}

        SELF_HEALING_RUNTIME: ${SELF_HEALING_RUNTIME:-true}

        OPENCODE_AUTO_INSTALL: ${OPENCODE_AUTO_INSTALL:-true}
        OPENCODE_DEFAULT_MODEL: ${OPENCODE_DEFAULT_MODEL:-opencode/deepseek-v4-flash-free}
        OPENCODE_DEFAULT_SMALL_MODEL: ${OPENCODE_DEFAULT_SMALL_MODEL:-opencode/mimo-v2.5-free}
        MCP_SMOKE_SERVERS_INSTALL: ${MCP_SMOKE_SERVERS_INSTALL:-false}

    image: native-openclaw:latest
    container_name: native-openclaw

    stdin_open: true
    tty: true

    env_file:
      - .env

    environment:
      APP_ENV: production
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}

      APP_DATA_DIR: /data
      SKILLS_DIR: /skills
      WORKSPACE_DIR: /workspace
      WORKFLOW_FILE: /workspace/WORKFLOW.md
      TOOLS_DIR: /app/tools
      MCP_CONFIG_PATH: ${MCP_CONFIG_PATH:-/app/mcp_agent.config.yaml}
      MCP_AGENT_ENABLED: ${MCP_AGENT_ENABLED:-true}
      MCP_AGENT_CONFIG_PATH: ${MCP_AGENT_CONFIG_PATH:-/app/mcp_agent.config.yaml}
      MCP_AGENT_ALLOW_CONFIG_WRITE: ${MCP_AGENT_ALLOW_CONFIG_WRITE:-true}
      MCP_AUTO_START: ${MCP_AUTO_START:-false}
      MCP_AGENT_VALIDATE_NPM_PACKAGE: ${MCP_AGENT_VALIDATE_NPM_PACKAGE:-true}
      MCP_AGENT_NPM_VALIDATE_TIMEOUT_MS: ${MCP_AGENT_NPM_VALIDATE_TIMEOUT_MS:-15000}
      AGENT_GATEWAY_ENABLED: ${AGENT_GATEWAY_ENABLED:-true}
      AGENT_GATEWAY_MAX_DELEGATION_DEPTH: ${AGENT_GATEWAY_MAX_DELEGATION_DEPTH:-1}
      AGENT_GATEWAY_DEFAULT_TIMEOUT_MS: ${AGENT_GATEWAY_DEFAULT_TIMEOUT_MS:-900000}
      AGENT_GATEWAY_MAX_FALLBACKS: ${AGENT_GATEWAY_MAX_FALLBACKS:-2}
      AGENT_GATEWAY_VALIDATE_RESULTS: ${AGENT_GATEWAY_VALIDATE_RESULTS:-true}
      AGENT_OPENCODE_ENABLED: ${AGENT_OPENCODE_ENABLED:-true}
      AGENT_INTERNAL_CODING_ENABLED: ${AGENT_INTERNAL_CODING_ENABLED:-true}
      AGENT_INTERNAL_CODING_MAX_PROMPT_CHARS: ${AGENT_INTERNAL_CODING_MAX_PROMPT_CHARS:-24000}
      AGENT_MCP_ENABLED: ${AGENT_MCP_ENABLED:-true}
      AGENT_BROWSER_ENABLED: ${AGENT_BROWSER_ENABLED:-false}
      AGENT_BROWSER_BASE_URL: ${AGENT_BROWSER_BASE_URL:-http://browser-agent:3101}
      AGENT_BROWSER_TIMEOUT_MS: ${AGENT_BROWSER_TIMEOUT_MS:-300000}
      AGENT_BROWSER_API_KEY: ${AGENT_BROWSER_API_KEY:-}
      AGENT_RESEARCH_ENABLED: ${AGENT_RESEARCH_ENABLED:-false}
      AGENT_RESEARCH_BASE_URL: ${AGENT_RESEARCH_BASE_URL:-http://research-agent:3102}
      AGENT_RESEARCH_TIMEOUT_MS: ${AGENT_RESEARCH_TIMEOUT_MS:-600000}
      AGENT_RESEARCH_API_KEY: ${AGENT_RESEARCH_API_KEY:-}
      AGENT_SPREADSHEET_ENABLED: ${AGENT_SPREADSHEET_ENABLED:-false}
      AGENT_SPREADSHEET_BASE_URL: ${AGENT_SPREADSHEET_BASE_URL:-http://spreadsheet-agent:3103}
      AGENT_SPREADSHEET_TIMEOUT_MS: ${AGENT_SPREADSHEET_TIMEOUT_MS:-300000}
      AGENT_SPREADSHEET_API_KEY: ${AGENT_SPREADSHEET_API_KEY:-}
      STORAGE_BACKEND: file

      NODE_OPTIONS: "--enable-source-maps"

      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1,openclaw,browser-agent,research-agent,spreadsheet-agent,llama-cpp,host.docker.internal,.local,.internal}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,::1,openclaw,browser-agent,research-agent,spreadsheet-agent,llama-cpp,host.docker.internal,.local,.internal}

      npm_config_proxy: ${HTTP_PROXY:-}
      npm_config_https_proxy: ${HTTPS_PROXY:-}
      npm_config_noproxy: ${NO_PROXY:-localhost,127.0.0.1,::1,openclaw,browser-agent,research-agent,spreadsheet-agent,llama-cpp,host.docker.internal,.local,.internal}

      LLAMACPP_ENABLED: ${LLAMACPP_ENABLED:-false}
      LLAMACPP_BASE_URL: ${LLAMACPP_BASE_URL:-http://llama-cpp:8091}
      LLAMACPP_DEFAULT_MODEL: ${LLAMACPP_DEFAULT_MODEL:-qwen2.5-0.5b-instruct-q4_k_m.gguf}
      LLAMACPP_MODELS: ${LLAMACPP_MODELS:-qwen2.5-0.5b-instruct-q4_k_m.gguf}
      LLAMACPP_TIMEOUT_MS: ${LLAMACPP_TIMEOUT_MS:-120000}
      LLAMACPP_REQUIRE_ON_STARTUP: ${LLAMACPP_REQUIRE_ON_STARTUP:-false}
      LLAMACPP_PORT: ${LLAMACPP_PORT:-8091}
      LLAMACPP_MODEL_SOURCE: ${LLAMACPP_MODEL_SOURCE:-local}
      LLAMACPP_HF_MODEL: ${LLAMACPP_HF_MODEL:-Qwen/Qwen2.5-0.5B-Instruct-GGUF:Q4_K_M}
      LLAMACPP_MODEL_PATH: ${LLAMACPP_MODEL_PATH:-/models/qwen2.5-0.5b-instruct-q4_k_m.gguf}
      LLAMACPP_MODEL_FILE: ${LLAMACPP_MODEL_FILE:-qwen2.5-0.5b-instruct-q4_k_m.gguf}
      LLAMACPP_MODEL_URL: ${LLAMACPP_MODEL_URL:-https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf}
      LLAMACPP_CTX_SIZE: ${LLAMACPP_CTX_SIZE:-8192}
      LLAMACPP_THREADS: ${LLAMACPP_THREADS:-4}

      CLOUDFLARE_AI_ENABLED: ${CLOUDFLARE_AI_ENABLED:-false}
      CLOUDFLARE_API_KEY: ${CLOUDFLARE_API_KEY:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_BASE_URL: ${CLOUDFLARE_BASE_URL:-}
      CLOUDFLARE_DEFAULT_MODEL: ${CLOUDFLARE_DEFAULT_MODEL:-@cf/meta/llama-3.1-8b-instruct}
      CLOUDFLARE_MODELS: ${CLOUDFLARE_MODELS:-@cf/meta/llama-3.1-8b-instruct,@cf/openai/gpt-oss-120b}
      CLOUDFLARE_TIMEOUT_MS: ${CLOUDFLARE_TIMEOUT_MS:-120000}

      HUGGINGFACE_ENABLED: ${HUGGINGFACE_ENABLED:-false}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      HUGGINGFACE_BASE_URL: ${HUGGINGFACE_BASE_URL:-https://router.huggingface.co/v1}
      HUGGINGFACE_DEFAULT_MODEL: ${HUGGINGFACE_DEFAULT_MODEL:-openai/gpt-oss-120b:fastest}
      HUGGINGFACE_MODELS: ${HUGGINGFACE_MODELS:-openai/gpt-oss-120b:fastest}
      HUGGINGFACE_TIMEOUT_MS: ${HUGGINGFACE_TIMEOUT_MS:-120000}
      HF_API_KEY: ${HF_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}

      COHERE_ENABLED: ${COHERE_ENABLED:-false}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      COHERE_BASE_URL: ${COHERE_BASE_URL:-https://api.cohere.ai/compatibility/v1}
      COHERE_DEFAULT_MODEL: ${COHERE_DEFAULT_MODEL:-command-a-plus-05-2026}
      COHERE_MODELS: ${COHERE_MODELS:-command-a-plus-05-2026}
      COHERE_TIMEOUT_MS: ${COHERE_TIMEOUT_MS:-120000}

      GITHUB_MODELS_ENABLED: ${GITHUB_MODELS_ENABLED:-false}
      GITHUB_MODELS_API_KEY: ${GITHUB_MODELS_API_KEY:-}
      GITHUB_MODELS_BASE_URL: ${GITHUB_MODELS_BASE_URL:-https://models.github.ai/inference}
      GITHUB_MODELS_DEFAULT_MODEL: ${GITHUB_MODELS_DEFAULT_MODEL:-openai/gpt-4.1}
      GITHUB_MODELS_MODELS: ${GITHUB_MODELS_MODELS:-openai/gpt-4.1}
      GITHUB_MODELS_API_VERSION: ${GITHUB_MODELS_API_VERSION:-2026-03-10}
      GITHUB_MODELS_ORG: ${GITHUB_MODELS_ORG:-}
      GITHUB_MODELS_USE_ORG_ENDPOINT: ${GITHUB_MODELS_USE_ORG_ENDPOINT:-false}
      GITHUB_MODELS_TIMEOUT_MS: ${GITHUB_MODELS_TIMEOUT_MS:-120000}
      PROVIDER_MODEL_DISCOVERY_ENABLED: ${PROVIDER_MODEL_DISCOVERY_ENABLED:-true}
      PROVIDER_MODEL_DISCOVERY_AUTO_REFRESH: ${PROVIDER_MODEL_DISCOVERY_AUTO_REFRESH:-false}
      PROVIDER_MODEL_DISCOVERY_CACHE_PATH: ${PROVIDER_MODEL_DISCOVERY_CACHE_PATH:-/app/data/provider-model-cache.json}
      PROVIDER_MODEL_DISCOVERY_CACHE_TTL_HOURS: ${PROVIDER_MODEL_DISCOVERY_CACHE_TTL_HOURS:-24}
      PROVIDER_MODEL_DISCOVERY_TIMEOUT_MS: ${PROVIDER_MODEL_DISCOVERY_TIMEOUT_MS:-30000}
      PROVIDER_MODEL_DISCOVERY_MAX_MODELS_PER_PROVIDER: ${PROVIDER_MODEL_DISCOVERY_MAX_MODELS_PER_PROVIDER:-200}
      PROVIDER_MODEL_DISCOVERY_CHAT_ONLY: ${PROVIDER_MODEL_DISCOVERY_CHAT_ONLY:-true}
      PROVIDER_MODEL_DISCOVERY_TOOLS_ONLY: ${PROVIDER_MODEL_DISCOVERY_TOOLS_ONLY:-false}
      PROVIDER_MODEL_DISCOVERY_SHOW_UNTESTED: ${PROVIDER_MODEL_DISCOVERY_SHOW_UNTESTED:-true}
      HUGGINGFACE_DISCOVERY_ENABLED: ${HUGGINGFACE_DISCOVERY_ENABLED:-true}
      HUGGINGFACE_DISCOVERY_PROVIDERS: ${HUGGINGFACE_DISCOVERY_PROVIDERS:-hf-inference,fireworks-ai,groq,cerebras,cohere,novita,together,sambanova,deepinfra}
      HUGGINGFACE_DISCOVERY_PIPELINE_TAGS: ${HUGGINGFACE_DISCOVERY_PIPELINE_TAGS:-text-generation,conversational}
      HUGGINGFACE_DISCOVERY_LIMIT_PER_PROVIDER: ${HUGGINGFACE_DISCOVERY_LIMIT_PER_PROVIDER:-50}
      CLOUDFLARE_DISCOVERY_ENABLED: ${CLOUDFLARE_DISCOVERY_ENABLED:-false}
      PROVIDER_ORDER: ${PROVIDER_ORDER:-groq,sambanova,mistral,huggingface,cohere,cloudflare,github-models,openrouter,gemini,llamacpp,ollama}

      WEB_UI_ENABLED: ${WEB_UI_ENABLED:-false}
      WEB_UI_HOST: ${WEB_UI_HOST:-0.0.0.0}
      WEB_UI_PORT: ${WEB_UI_PORT:-18790}
      WEB_UI_USERNAME: ${WEB_UI_USERNAME:-admin}
      WEB_UI_PASSWORD: ${WEB_UI_PASSWORD:-change-me}
      WEB_UI_SESSION_SECRET: ${WEB_UI_SESSION_SECRET:-change-this-secret}

      SELF_HEALING_RUNTIME: ${SELF_HEALING_RUNTIME:-true}

      OPENCODE_AGENT_ENABLED: ${OPENCODE_AGENT_ENABLED:-true}
      OPENCODE_AGENT_COMMAND: ${OPENCODE_AGENT_COMMAND:-opencode}
      OPENCODE_AGENT_DIRECT_MODE: ${OPENCODE_AGENT_DIRECT_MODE:-true}
      OPENCODE_AGENT_INJECT_SAFETY_PREAMBLE: ${OPENCODE_AGENT_INJECT_SAFETY_PREAMBLE:-false}
      OPENCODE_AGENT_CWD: ${OPENCODE_AGENT_CWD:-/app}
      OPENCODE_AGENT_TIMEOUT_MS: ${OPENCODE_AGENT_TIMEOUT_MS:-900000}
      OPENCODE_AGENT_IDLE_TIMEOUT_MS: ${OPENCODE_AGENT_IDLE_TIMEOUT_MS:-0}
      OPENCODE_AGENT_KILL_GRACE_MS: ${OPENCODE_AGENT_KILL_GRACE_MS:-10000}
      OPENCODE_AGENT_KILL_TREE: ${OPENCODE_AGENT_KILL_TREE:-true}
      OPENCODE_AGENT_MAX_OUTPUT_CHARS: ${OPENCODE_AGENT_MAX_OUTPUT_CHARS:-30000}
      OPENCODE_AGENT_REQUIRE_CONFIRMATION: ${OPENCODE_AGENT_REQUIRE_CONFIRMATION:-false}
      OPENCODE_AGENT_USE_FOR_SELF_HEALING: ${OPENCODE_AGENT_USE_FOR_SELF_HEALING:-true}
      OPENCODE_AGENT_USE_FOR_SELF_UPGRADE: ${OPENCODE_AGENT_USE_FOR_SELF_UPGRADE:-true}
      OPENCODE_AGENT_ARGS_TEMPLATE: ${OPENCODE_AGENT_ARGS_TEMPLATE:-run --pure --dangerously-skip-permissions "{{task}}"}

      OPENCODE_AUTH_BOOTSTRAP: ${OPENCODE_AUTH_BOOTSTRAP:-true}
      OPENCODE_AUTH_PROVIDER: ${OPENCODE_AUTH_PROVIDER:-opencode}
      OPENCODE_AUTH_FILE: ${OPENCODE_AUTH_FILE:-}
      OPENCODE_AUTH_OVERWRITE: ${OPENCODE_AUTH_OVERWRITE:-true}
      OPENCODE_ZEN_API_KEY: ${OPENCODE_ZEN_API_KEY:-}
      OPENCODE_DOCTOR_SMOKE_TEST: ${OPENCODE_DOCTOR_SMOKE_TEST:-false}

      OPENCODE_AUTO_INSTALL: ${OPENCODE_AUTO_INSTALL:-true}
      OPENCODE_INSTALL_STRATEGY: ${OPENCODE_INSTALL_STRATEGY:-npm-global}
      OPENCODE_INSTALL_COMMAND: ${OPENCODE_INSTALL_COMMAND:-}
      OPENCODE_INSTALL_TIMEOUT_MS: ${OPENCODE_INSTALL_TIMEOUT_MS:-300000}
      OPENCODE_INSTALL_REQUIRE_APPROVAL: ${OPENCODE_INSTALL_REQUIRE_APPROVAL:-false}
      OPENCODE_INSTALL_RETRY_AFTER_INSTALL: ${OPENCODE_INSTALL_RETRY_AFTER_INSTALL:-false}
      OPENCODE_INSTALL_LOG_OUTPUT: ${OPENCODE_INSTALL_LOG_OUTPUT:-true}
      OPENCODE_INSTALL_USE_SUDO: ${OPENCODE_INSTALL_USE_SUDO:-false}

    volumes:
      # Persistent app data
      - ./data:/data
      - ./skills:/skills
      - ./workspace:/workspace

      # Persistent OpenCode data/log/db/auth.
      # Make sure host folder owner is uid 100 gid 101.
      - ./data/opencode:/home/openclaw/.local/share/opencode

      # Source bind mounts for self-healing/self-upgrade.
      # These make code changes inside the container persist back to the host repo.
      - ./src:/app/src
      - ./test:/app/test
      - ./tools:/app/tools
      - ./scripts:/app/scripts
      - ./docs:/app/docs
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./Dockerfile:/app/Dockerfile
      - ./docker-compose.yml:/app/docker-compose.yml
      - ./README.md:/app/README.md

    ports:
      - "${API_PORT:-18789}:18789"
      - "${WEB_UI_PORT:-18790}:18790"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped
  llama-model-download:
    profiles: ["llamacpp", "local-ai"]
    image: curlimages/curl:latest
    container_name: native-openclaw-llama-model-download
    user: "0:0"
    volumes:
      - ./models:/models:Z
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      ALL_PROXY: ${ALL_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1,openclaw,llama-cpp,host.docker.internal,.local,.internal}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      all_proxy: ${ALL_PROXY:-}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,::1,openclaw,llama-cpp,host.docker.internal,.local,.internal}
      LLAMACPP_MODEL_FILE: ${LLAMACPP_MODEL_FILE:-qwen2.5-0.5b-instruct-q4_k_m.gguf}
      LLAMACPP_MODEL_URL: ${LLAMACPP_MODEL_URL:-https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf}
    entrypoint: ["/bin/sh", "-lc"]
    command: |
      set -eu

      mkdir -p /models

      FILE="/models/$${LLAMACPP_MODEL_FILE}"
      URL="$${LLAMACPP_MODEL_URL}"
      TMP="$${FILE}.tmp"

      if [ -s "$${FILE}" ]; then
        echo "Model already exists:"
        ls -lh "$${FILE}"
        exit 0
      fi

      echo "Model not found. Downloading:"
      echo "$${URL}"

      rm -f "$${TMP}"

      curl -fL \
        --retry 5 \
        --retry-delay 5 \
        --connect-timeout 60 \
        --max-time 0 \
        -o "$${TMP}" \
        "$${URL}"

      mv "$${TMP}" "$${FILE}"
      chmod 644 "$${FILE}" || true

      echo "Model downloaded successfully:"
      ls -lh "$${FILE}"

  llama-cpp:
    profiles: ["llamacpp", "local-ai"]
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: native-openclaw-llama-cpp
    restart: unless-stopped
    depends_on:
      llama-model-download:
        condition: service_completed_successfully
    ports:
      - "${LLAMACPP_PORT:-8091}:8091"
    volumes:
      - ./models:/models:Z
      - llama-cpp-cache:/root/.cache/llama.cpp
    environment:
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1,openclaw,llama-cpp,host.docker.internal,.local,.internal}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,::1,openclaw,llama-cpp,host.docker.internal,.local,.internal}
    command:
      - --model
      - ${LLAMACPP_MODEL_PATH:-/models/qwen2.5-0.5b-instruct-q4_k_m.gguf}
      - --host
      - 0.0.0.0
      - --port
      - "8091"
      - --ctx-size
      - ${LLAMACPP_CTX_SIZE:-8192}
      - --threads
      - ${LLAMACPP_THREADS:-4}

  browser-agent:
    profiles: ["browser", "external-agents"]
    build:
      context: ./agents/browser-agent
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      BROWSER_AGENT_PORT: 3101
      BROWSER_AGENT_WORKSPACE: /workspace
      BROWSER_AGENT_API_KEY: ${AGENT_BROWSER_API_KEY:-}
    volumes:
      - ./workspace:/workspace
    ports:
      - "${BROWSER_AGENT_PORT:-3101}:3101"
    restart: unless-stopped

  research-agent:
    profiles: ["research", "external-agents"]
    build:
      context: ./agents/research-agent
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      RESEARCH_AGENT_PORT: 3102
      RESEARCH_AGENT_WORKSPACE: /workspace
      RESEARCH_AGENT_API_KEY: ${AGENT_RESEARCH_API_KEY:-}
      RESEARCH_AGENT_BACKEND_URL: ${RESEARCH_AGENT_BACKEND_URL:-}
    volumes:
      - ./workspace:/workspace
    ports:
      - "${RESEARCH_AGENT_PORT:-3102}:3102"
    restart: unless-stopped

  # spreadsheet-agent:
  #   profiles: ["spreadsheet", "external-agents"]
  #   build:
  #     context: ./agents/spreadsheet-agent
  #     dockerfile: Dockerfile
  #   environment:
  #     NODE_ENV: production
  #     SPREADSHEET_AGENT_PORT: 3103
  #     SPREADSHEET_AGENT_WORKSPACE: /workspace
  #     SPREADSHEET_AGENT_API_KEY: ${AGENT_SPREADSHEET_API_KEY:-}
