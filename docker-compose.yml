  #     SPREADSHEET_GOOGLE_CREDENTIALS_JSON: ${SPREADSHEET_GOOGLE_CREDENTIALS_JSON:-}
  #     SPREADSHEET_MCP_URL: ${SPREADSHEET_MCP_URL:-}
  #   volumes:
  #     - ./workspace:/workspace
  #   ports:
  #     - "${SPREADSHEET_AGENT_PORT:-3103}:3103"
  #   restart: unless-stopped

volumes:
  llama-cpp-cache:
