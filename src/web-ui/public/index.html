<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>smooth Console</title>
    <link rel="icon" href="/favicon.ico?v=smooth" sizes="any">
    <link rel="shortcut icon" href="/favicon.ico?v=smooth" type="image/x-icon">
    <link rel="apple-touch-icon" href="/assets/branding/smooth-icon.png">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand-lockup">
        <img
          class="brand-logo"
          src="/assets/branding/smooth-logo.png"
          alt="smooth"
          onerror="this.style.display='none'">
        <div>
          <h1>smooth</h1>
          <p>Make your life easier</p>
        </div>
      </div>
      <div class="topbar-actions">
        <span class="status-badge"><span aria-hidden="true"></span> Online</span>
        <form method="post" action="/logout">
          <button class="ghost-button" type="submit">Logout</button>
        </form>
      </div>
    </header>

    <main class="chat-shell">
      <section class="chat-card" aria-label="smooth chat">
        <div id="messages" class="messages" aria-live="polite"></div>
        <form id="chat-form" class="composer">
          <textarea
            id="message-input"
            rows="3"
            placeholder="Ask smooth..."
            aria-label="Message"
            maxlength="64000"></textarea>
          <div class="composer-actions">
            <button id="clear-button" type="button" class="secondary-button">Clear</button>
            <button id="send-button" type="submit">Send</button>
          </div>
        </form>
      </section>
    </main>

    <div class="support-brand" aria-label="Supporting brand">Powered by Hazana Corp</div>
    <script src="/app.js"></script>
  </body>
</html>
