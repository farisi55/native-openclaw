<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>smooth Login</title>
    <link rel="icon" href="/favicon.ico?v=smooth" sizes="any">
    <link rel="shortcut icon" href="/favicon.ico?v=smooth" type="image/x-icon">
    <link rel="apple-touch-icon" href="/assets/branding/smooth-icon.png">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-card" aria-label="smooth login">
        <div class="login-brand">
          <img
            class="login-logo"
            src="/assets/branding/smooth-logo.png"
            alt="smooth"
            onerror="this.style.display='none'">
          <div class="brand-mark">s</div>
        </div>
        <h1>smooth</h1>
        <p class="login-subtitle">Make your life easier</p>
        <p class="login-error" data-empty="{{ERROR}}">{{ERROR}}</p>
        <form method="post" action="/login" class="login-form">
          <label>
            <span>Username</span>
            <input name="username" autocomplete="username" required>
          </label>
          <label>
            <span>Password</span>
            <input name="password" type="password" autocomplete="current-password" required>
          </label>
          <button type="submit">Login</button>
        </form>
      </section>
    </main>
    <div class="support-brand" aria-label="Supporting brand">Powered by Hazana Corp</div>
  </body>
</html>
